# HOST nginx vhost (not the container one). Install on the VM:
#   apt-get install -y nginx certbot python3-certbot-nginx
#   cp deploy/nginx-exness.sanskarshukla.com.conf /etc/nginx/sites-available/exness.sanskarshukla.com
#   ln -s /etc/nginx/sites-available/exness.sanskarshukla.com /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d exness.sanskarshukla.com     # adds HTTPS + redirect automatically
#
# Prerequisite: DNS A record  exness.sanskarshukla.com -> 169.58.4.35
# NOTE: if Poker LLM already runs its own nginx/traefik on ports 80/443,
# add this as another vhost there instead of installing a second nginx.

server {
    listen 80;
    server_name exness.sanskarshukla.com;

    # Everything proxies to the exness frontend container (which serves the
    # SPA and internally routes /api/v2 -> backend and /ws -> websocket).
    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade support (for /ws)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
